services:
  postgres:
    image: postgres:16-alpine
    container_name: relaxchill_postgres
    environment:
      POSTGRES_USER: relaxchill
      POSTGRES_PASSWORD: relaxchill123
      POSTGRES_DB: relaxchill_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: relaxchill_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: